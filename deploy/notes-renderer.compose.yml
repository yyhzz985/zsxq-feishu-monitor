services:
  notes-renderer:
    image: zhaoolee/notes@sha256:88e423f70edb1104fdde9e74166361f921b71b60cae30acfa2212a886d839015
    container_name: hermes-notes
    init: true
    ipc: host
    restart: unless-stopped
    ports:
      - "127.0.0.1:18080:3001"
    volumes:
      - /opt/notes-renderer/storage/images:/app/storage/images
    mem_limit: 640m
    memswap_limit: 1536m
    cpus: 1.0
    pids_limit: 256
    oom_score_adj: 500
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:3001/api/health').then(r =>
          process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
